<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okoshi Schedule</title>
<style>
:root { color-scheme: light; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  background: #eef1f8;
  color: #1e2436;
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Header ── */
.hd {
  background: linear-gradient(135deg, #0f1f5c 0%, #1a237e 60%, #283593 100%);
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(15,31,92,0.35);
}
.hd-inner {
  max-width: 1080px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  height: 56px;
  flex-wrap: wrap;
  padding: 8px 0;
}

.brand { display: flex; align-items: center; gap: 11px; }
.brand-bars { display: flex; align-items: flex-end; gap: 3px; height: 24px; }
.b1 { width: 4px; height: 12px; background: #c9860b; border-radius: 2px; }
.b2 { width: 4px; height: 22px; background: #f9c93e; border-radius: 2px; }
.b3 { width: 4px; height: 8px;  background: #c9860b; border-radius: 2px; }
.brand-text { line-height: 1.15; }
.brand-name { font-size: 15px; font-weight: 800; letter-spacing: 0.13em; color: #fff; text-transform: uppercase; }
.brand-sub  { font-size: 9px;  font-weight: 500; letter-spacing: 0.2em;  color: rgba(255,255,255,0.45); text-transform: uppercase; }

.hd-center { text-align: center; }
.hd-day  { font-size: 19px; font-weight: 700; color: #fff; letter-spacing: 0.03em; line-height: 1.1; }
.hd-date { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.06em; }

.hd-right { display: flex; align-items: center; gap: 10px; }
.live-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: rgba(255,255,255,0.55); letter-spacing: 0.04em;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #69f0ae;
  animation: lpulse 2.2s ease-in-out infinite;
}
@keyframes lpulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(105,240,174,0.4); }
  50%      { box-shadow: 0 0 0 5px rgba(105,240,174,0); }
}
.rfbtn {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.22);
  color: rgba(255,255,255,0.85); padding: 6px 14px; border-radius: 7px;
  cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.2s; white-space: nowrap;
}
.rfbtn:hover { background: rgba(255,255,255,0.2); }
.rfbtn:disabled { opacity: 0.35; cursor: default; }

/* ── Main ── */
.main { max-width: 1080px; margin: 0 auto; padding: 16px 14px 36px; }
.mb14 { margin-bottom: 14px; }

/* ── Timeline strip ── */
.tl-strip {
  background: #fff; border-radius: 12px; padding: 14px 16px;
  border: 1px solid #dde3ee; box-shadow: 0 1px 8px rgba(0,0,0,0.05);
}
.tl-head {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
}
.sec-lbl {
  font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: #8896a8;
}
.tl-legend { display: flex; align-items: center; gap: 14px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #9aa6b6; }
.legend-swatch { width: 16px; height: 10px; border-radius: 3px; }
.ls-busy { background: linear-gradient(90deg,#2563eb,#3b82f6); }
.ls-free { background: rgba(22,163,74,0.15); border: 1px solid rgba(22,163,74,0.4); }

.tl-labels {
  display: flex; justify-content: space-between;
  font-size: 9px; color: #b0bac8; padding: 0 1px; margin-bottom: 5px;
}
.tl-bar {
  position: relative; height: 44px;
  background: #f3f5fb; border-radius: 7px; overflow: hidden;
}

/* ── Grid ── */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 660px) { .g2 { grid-template-columns: 1fr; } }

/* ── Card ── */
.card {
  background: #fff; border-radius: 12px;
  border: 1px solid #dde3ee; box-shadow: 0 1px 8px rgba(0,0,0,0.05); overflow: hidden;
}
.card-hd {
  display: flex; align-items: center; gap: 9px;
  padding: 11px 16px 10px; border-bottom: 1px solid #f0f2f9;
}
.card-accent { width: 3px; height: 17px; border-radius: 2px; flex-shrink: 0; }
.card-lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #8896a8; flex: 1; }
.card-num {
  background: #f0f2f9; color: #9aa6b6;
  font-size: 11px; font-weight: 700; padding: 2px 10px;
  border-radius: 20px; min-width: 28px; text-align: center;
}
.card-num.on { background: #eff6ff; color: #1d4ed8; }
.card-num.act { background: #fff7ed; color: #c2710c; }

/* ── Event rows ── */
.evscroll { max-height: 290px; overflow-y: auto; }
.evscroll::-webkit-scrollbar { width: 3px; }
.evscroll::-webkit-scrollbar-thumb { background: #dde3ee; border-radius: 2px; }

.ev-row {
  display: flex; align-items: flex-start; gap: 11px;
  padding: 9px 16px; border-bottom: 1px solid #f3f5fa;
  transition: background 0.12s;
}
.ev-row:last-child { border-bottom: none; }
.ev-row:hover { background: #f8f9fd; }
.ev-time { font-size: 11px; font-weight: 600; color: #1d4ed8; min-width: 90px; padding-top: 2px; letter-spacing: 0.02em; }
.ev-info { flex: 1; min-width: 0; }
.ev-name { font-size: 13px; font-weight: 500; color: #1e2436; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ev-loc  { font-size: 11px; color: #8896a8; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── Slot rows ── */
.slot-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 16px; border-bottom: 1px solid #f3f5fa;
}
.slot-row:last-child { border-bottom: none; }
.slot-bar { width: 4px; height: 38px; background: linear-gradient(180deg,#16a34a,#4ade80); border-radius: 2px; flex-shrink: 0; }
.slot-time { font-size: 15px; font-weight: 700; color: #16a34a; letter-spacing: 0.01em; }
.slot-dur  { font-size: 11px; color: #6b7280; margin-top: 2px; }

/* ── Action rows ── */
.act-row {
  padding: 10px 16px; border-bottom: 1px solid #f3f5fa; transition: background 0.12s;
}
.act-row:last-child { border-bottom: none; }
.act-row:hover { background: #f8f9fd; }
.act-from  { font-size: 12px; font-weight: 600; color: #1e2436; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px; }
.act-subj  { font-size: 11px; color: #546e7a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 5px; }
.act-why   {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; color: #b45309; letter-spacing: 0.02em;
}
.act-why::before { content: '▸'; font-size: 9px; }

/* ── Week grid ── */
.week-wrap { overflow-x: auto; padding-bottom: 2px; }
.week-wrap::-webkit-scrollbar { height: 3px; }
.week-wrap::-webkit-scrollbar-thumb { background: #dde3ee; border-radius: 2px; }
.week-cols {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 1px; background: #e8edf6; border-radius: 8px;
  overflow: hidden; min-width: 560px;
}
.wk-col { background: #fff; padding: 11px 10px 13px; min-height: 100px; }
.wk-col.today { background: #f0f4ff; }
.wk-dow { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #b0bac8; margin-bottom: 3px; }
.wk-num { font-size: 22px; font-weight: 800; color: #1e2436; line-height: 1; margin-bottom: 9px; }
.wk-col.today .wk-num { color: #1a237e; }
.wk-ev {
  display: flex; align-items: flex-start;
  font-size: 10px; color: #546e7a; margin-bottom: 3px;
}
.wk-dot { width: 5px; height: 5px; border-radius: 50%; background: #3b82f6; flex-shrink: 0; margin-top: 3px; margin-right: 5px; }
.wk-ev-txt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.wk-more { font-size: 10px; color: #3b82f6; margin-top: 3px; font-weight: 600; }

/* ── Claude Stats ── */
.cstat-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
  background: #e8edf6; margin: 0 14px 10px; border-radius: 8px; overflow: hidden;
}
.cstat { background: #fff; padding: 12px 10px; text-align: center; }
.cstat-val { font-size: 22px; font-weight: 800; color: #1e2436; line-height: 1.1; letter-spacing: -0.02em; }
.cstat-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #8896a8; margin-top: 3px; }
.cstat-agent { background: #f5f3ff; }
.cstat-agent .cstat-val { color: #7c3aed; }
.cstat-agent .cstat-lbl { color: #9d72f5; }
.cstat-cost { background: #f0fdf4; }
.cstat-cost .cstat-val { color: #16a34a; font-size: 18px; }
.cstat-cost .cstat-lbl { color: #4ade80; }
.cstat-meta {
  padding: 5px 16px 10px; font-size: 10px; color: #9aa6b6;
  display: flex; justify-content: space-between; align-items: center;
}
.ctabs { display: flex; border-bottom: 1px solid #f0f2f9; }
.ctab {
  flex: 1; padding: 8px 4px; text-align: center;
  font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
  color: #9aa6b6; cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.ctab.active { color: #7c3aed; border-bottom-color: #7c3aed; }
.ctab:hover:not(.active) { color: #6d28d9; }

/* ── States ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 30px 16px; color: #8896a8; font-size: 12px;
}
.spin {
  width: 14px; height: 14px; border: 2px solid #dde3ee;
  border-top-color: #1d4ed8; border-radius: 50%;
  animation: spin 0.7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty { padding: 26px 16px; text-align: center; color: #b0bac8; font-size: 12px; }
.errst { padding: 14px 16px; font-size: 12px; color: #b91c1c; }

/* ── Timeline overlays ── */
.tl-ev {
  position: absolute; top: 4px; bottom: 4px;
  background: linear-gradient(135deg, #1d4ed8, #3b82f6);
  border-radius: 4px; overflow: hidden;
  display: flex; align-items: center; padding: 0 5px; min-width: 3px;
}
.tl-ev-lbl { font-size: 9px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-free { position: absolute; top: 0; bottom: 0; background: rgba(22,163,74,0.1); border-left: 2px solid rgba(22,163,74,0.35); }
.tl-now {
  position: absolute; top: 0; bottom: 0; width: 2px;
  background: #dc2626; z-index: 5;
}
.tl-now::before {
  content: ''; position: absolute; top: -3px; left: -4px;
  width: 10px; height: 10px; border-radius: 50%; background: #dc2626;
}
</style>
</head>

<script>
function jst(d){const ms=(d||new Date()).getTime();return new Date(ms+new Date().getTimezoneOffset()*60000+9*3600000);}
function fmtD(d){return d.toISOString().slice(0,10);}
function tm(iso){if(!iso)return 0;const d=jst(new Date(iso));return d.getHours()*60+d.getMinutes();}
function hhmm(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}
const WD=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const WDS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON=['January','February','March','April','May','June','July','August','September','October','November','December'];

function updHd(){const n=jst();document.getElementById('hdDay').textContent=WD[n.getDay()];document.getElementById('hdDate').textContent=`${MON[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}`;document.getElementById('hdUpdated').textContent=`Updated ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}

function freeSlots(evs,ds){
  const S=9*60,E=19*60,MIN=30;
  const busy=evs.filter(e=>(e.start?.dateTime||e.start?.date||'').startsWith(ds)).map(e=>({s:Math.max(S,tm(e.start?.dateTime)),e:Math.min(E,tm(e.end?.dateTime))})).filter(b=>b.e>b.s).sort((a,b)=>a.s-b.s);
  const mg=[];for(const b of busy){if(!mg.length||b.s>=mg.at(-1).e)mg.push({...b});else mg.at(-1).e=Math.max(mg.at(-1).e,b.e);}
  const gaps=[];let cur=S;for(const b of mg){if(b.s-cur>=MIN)gaps.push({s:cur,e:b.s});cur=Math.max(cur,b.e);}if(E-cur>=MIN)gaps.push({s:cur,e:E});return gaps;
}

function renderTL(evs,ds){
  const bar=document.getElementById('tlBar');const S=9*60,E=19*60,T=E-S;bar.innerHTML='';
  for(const g of freeSlots(evs,ds)){const el=document.createElement('div');el.className='tl-free';el.style.cssText=`left:${(g.s-S)/T*100}%;width:${(g.e-g.s)/T*100}%;position:absolute;top:0;bottom:0`;bar.appendChild(el);}
  for(const ev of evs.filter(e=>(e.start?.dateTime||e.start?.date||'').startsWith(ds))){
    const s=Math.max(S,tm(ev.start?.dateTime)||S),e=Math.min(E,tm(ev.end?.dateTime)||E);
    if(s>=E||e<=S||e<=s)continue;
    const el=document.createElement('div');el.className='tl-ev';el.style.cssText=`left:${(s-S)/T*100}%;width:${Math.max(0.5,(e-s)/T*100)}%;position:absolute;top:4px;bottom:4px`;el.title=ev.summary||'';el.innerHTML=`<span class="tl-ev-lbl">${ev.summary||''}</span>`;bar.appendChild(el);
  }
  const now=jst();const nowM=now.getHours()*60+now.getMinutes();
  if(nowM>=S&&nowM<=E&&fmtD(now)===ds){const el=document.createElement('div');el.className='tl-now';el.style.cssText=`left:${(nowM-S)/T*100}%;position:absolute`;bar.appendChild(el);}
}

function renderToday(evs,ds){
  const el=document.getElementById('todayList'),badge=document.getElementById('todayN');
  const day=evs.filter(e=>(e.start?.dateTime||e.start?.date||'').startsWith(ds)).sort((a,b)=>new Date(a.start?.dateTime||a.start?.date)-new Date(b.start?.dateTime||b.start?.date));
  badge.textContent=day.length;if(day.length)badge.classList.add('on');
  if(!day.length){el.innerHTML='<div class="empty">No events today</div>';return;}
  el.innerHTML=day.map(ev=>{const t=ev.start?.dateTime?`${hhmm(tm(ev.start.dateTime))} – ${hhmm(tm(ev.end.dateTime))}`:'All day';return`<div class="ev-row"><div class="ev-time">${t}</div><div class="ev-info"><div class="ev-name">${ev.summary||'(No title)'}</div>${ev.location?`<div class="ev-loc">📍 ${ev.location}</div>`:''}</div></div>`;}).join('');
}

function renderSlots(evs,ds){
  const el=document.getElementById('slotsList'),badge=document.getElementById('slotsN');
  const slots=freeSlots(evs,ds);badge.textContent=slots.length;
  if(!slots.length){el.innerHTML='<div class="empty">No free slots today</div>';return;}
  el.innerHTML=slots.map(g=>`<div class="slot-row"><div class="slot-bar"></div><div><div class="slot-time">${hhmm(g.s)} – ${hhmm(g.e)}</div><div class="slot-dur">${g.e-g.s} minutes available</div></div></div>`).join('');
}

function renderWeek(evs,startD){
  const grid=document.getElementById('weekCols'),todayStr=fmtD(jst());let html='';
  for(let i=0;i<7;i++){
    const d=new Date(startD.getTime()+i*86400000),ds=fmtD(jst(d)),isT=ds===todayStr;
    const day=evs.filter(e=>(e.start?.dateTime||e.start?.date||'').startsWith(ds)).sort((a,b)=>new Date(a.start?.dateTime||a.start?.date)-new Date(b.start?.dateTime||b.start?.date));
    const evH=day.slice(0,4).map(ev=>{const t=ev.start?.dateTime?hhmm(tm(ev.start.dateTime)):'';return`<div class="wk-ev"><span class="wk-dot"></span><span class="wk-ev-txt">${t} ${ev.summary||''}</span></div>`;}).join('');
    const more=day.length>4?`<div class="wk-more">+${day.length-4} more</div>`:'';
    html+=`<div class="wk-col${isT?' today':''}"><div class="wk-dow">${WDS[d.getDay()]}</div><div class="wk-num">${d.getDate()}</div>${evH}${more}</div>`;
  }
  grid.innerHTML=html;
}

function renderActions(listId,badgeId,items){
  const el=document.getElementById(listId),badge=document.getElementById(badgeId);
  badge.textContent=items.length;if(items.length)badge.classList.add('act');
  if(!items.length){el.innerHTML='<div class="empty">No action items ✓</div>';return;}
  el.innerHTML=items.map(it=>`<div class="act-row"><div class="act-from">${it.sender||it.from||'—'}</div><div class="act-subj">${it.subject||it.content||'—'}</div><div class="act-why">${it.reason||''}</div></div>`).join('');
}

function parse(r){try{return r.structuredContent??JSON.parse(r.content?.[0]?.text??'{}')}catch(e){return{};}}
function parseJSON(s){try{return JSON.parse(s.replace(/```(?:json)?|```/g,'').trim())}catch(e){return null;}}

function loadStatic(){
  function getJSON(id){try{return JSON.parse(document.getElementById(id).textContent||'[]');}catch(e){return[];}}
  const now=jst(),todayStr=fmtD(now);
  const evs=getJSON('static-events-data');
  renderTL(evs,todayStr);renderToday(evs,todayStr);renderSlots(evs,todayStr);renderWeek(evs,now);
  renderActions('emailList','emailN',getJSON('static-emails-data'));
  renderActions('slackList','slackN',getJSON('static-slacks-data'));
}

async function loadAll(){
  const btn=document.getElementById('rfBtn');btn.disabled=true;btn.textContent='…';
  const now=jst(),todayStr=fmtD(now),end7=new Date(now.getTime()+7*86400000),ago14=fmtD(new Date(now.getTime()-14*86400000));

  if(!window.cowork){loadStatic();updHd();btn.disabled=false;btn.textContent='↻ Refresh';return;}

  let evs=[];
  try{const r=await window.cowork.callMcpTool('mcp__83ca95b3-3483-4795-8f90-bed315f8a560__list_events',{startTime:todayStr+'T00:00:00+09:00',endTime:fmtD(end7)+'T23:59:59+09:00',timeZone:'Asia/Tokyo',orderBy:'startTime',pageSize:100});evs=parse(r).events||[];}catch(e){console.error('cal',e);}
  renderTL(evs,todayStr);renderToday(evs,todayStr);renderSlots(evs,todayStr);renderWeek(evs,now);

  try{
    const r=await window.cowork.callMcpTool('mcp__f1fbed84-41d2-41a5-b28b-ced37c54b2cf__search_threads',{query:'to:daizo.okoshi@gmo-cybersecurity.com is:unread newer_than:14d -in:sent -in:draft',pageSize:25});
    const threads=(parse(r).threads||[]).filter(t=>!/(ml3\.sbcr|sbcr\.jp|noreply@donuts|benefits@gmo|skilljar|academy-support)/.test(t.messages?.[0]?.sender||''));
    if(threads.length){try{const resp=await window.cowork.askClaude('以下のメールスレッドから大越 大造さんが返信すべきものを抽出し、JSONのみ返すこと（他テキスト不要）。形式:[{"sender":"名前","subject":"件名","reason":"要対応理由(15字以内)"}]',[{type:'text',text:JSON.stringify(threads.slice(0,12).map(t=>({sender:t.messages[0].sender,subject:t.messages[0].subject,snippet:t.messages[0].snippet?.slice(0,80)})))}]);const items=parseJSON(resp);renderActions('emailList','emailN',Array.isArray(items)?items:[]);}catch{renderActions('emailList','emailN',threads.slice(0,8).map(t=>({sender:t.messages?.[0]?.sender||'',subject:t.messages?.[0]?.subject||'',reason:'要確認'})));}}else renderActions('emailList','emailN',[]);
  }catch(e){document.getElementById('emailList').innerHTML='<div class="errst">Error loading email</div>';}

  try{
    const r=await window.cowork.callMcpTool('mcp__8f740023-b6d5-460f-a738-ce4022e49ec3__slack_search_public_and_private',{query:`to:me after:${ago14}`,sort:'timestamp',sort_dir:'desc',limit:15,include_context:false});
    const raw=parse(r).results||'';
    if(raw.length>100){try{const resp=await window.cowork.askClaude('以下のSlackメッセージから大越 大造（U04CBH60NGJ）が返信すべきものを抽出しJSONのみ返すこと。Salesforceボット等除外。形式:[{"sender":"名前","subject":"内容(25字)","reason":"理由(15字)"}]',[{type:'text',text:raw.slice(0,6000)}]);const items=parseJSON(resp);renderActions('slackList','slackN',Array.isArray(items)?items:[]);}catch{renderActions('slackList','slackN',[]); } }else renderActions('slackList','slackN',[]);
  }catch(e){document.getElementById('slackList').innerHTML='<div class="errst">Error loading Slack</div>';}

  updHd();btn.disabled=false;btn.textContent='↻ Refresh';
}

function fmtTok(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return Math.round(n/1e3)+'K';return n.toLocaleString();}
function fmtCost(inp,out){const u=(inp/1e6)*3+(out/1e6)*15;return u>=10?'$'+u.toFixed(1):u>=1?'$'+u.toFixed(2):'$'+u.toFixed(3);}

function renderClaudeStats(){
  const el=document.getElementById('claude-stats-data');
  let data=null;try{data=el?JSON.parse(el.textContent):null;}catch(e){}
  const body=document.getElementById('claudeStatsBody'),badge=document.getElementById('claudeSessionN');
  if(!data||!data.total){body.innerHTML='<div class="empty">統計データ未取得（次回ルーティン時に更新）</div>';return;}
  badge.textContent=data.total.agents+' runs';badge.classList.add('on');
  const upd=data.updatedAt?data.updatedAt.replace('T',' ').slice(0,16):'—';
  const PERIODS=[{k:'today',l:'今日'},{k:'week',l:'今週'},{k:'month',l:'今月'},{k:'total',l:'累計'}];
  function statHtml(k){const d=data[k];const ag=d.agents??0;const cost=fmtCost(d.inputTokens,d.outputTokens);return `<div class="cstat-grid">
    <div class="cstat"><div class="cstat-val">${fmtTok(d.inputTokens)}</div><div class="cstat-lbl">入力 Token</div></div>
    <div class="cstat"><div class="cstat-val">${fmtTok(d.outputTokens)}</div><div class="cstat-lbl">出力 Token</div></div>
    <div class="cstat cstat-agent"><div class="cstat-val">${ag}</div><div class="cstat-lbl">Agent 実行</div></div>
    <div class="cstat cstat-cost"><div class="cstat-val">${cost}</div><div class="cstat-lbl">推定コスト</div></div>
  </div><div class="cstat-meta"><span>Updated ${upd}</span><span>${d.sessions} sessions</span></div>`;}
  const tabs=PERIODS.map((p,i)=>`<div class="ctab${i===0?' active':''}" onclick="cTabSwitch(this,'${p.k}')">${p.l}</div>`).join('');
  body.innerHTML=`<div class="ctabs">${tabs}</div><div id="cstat-body">${statHtml('today')}</div>`;
  window.cTabSwitch=function(t,k){document.querySelectorAll('.ctab').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.getElementById('cstat-body').innerHTML=statHtml(k);document.getElementById('claudeSessionN').textContent=(data[k].agents??0)+' runs';};
}

updHd();renderClaudeStats();loadAll();
</script>
